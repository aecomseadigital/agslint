name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version-pr:
    runs-on: ${{ vars.CI_RUNNER != '' && vars.CI_RUNNER || 'ubuntu-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Open or update version PR
        uses: changesets/action@v1
        with:
          version: npm run release:version
          commit: Version Packages
          title: Version Packages
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package-release:
    runs-on: ${{ vars.CI_RUNNER != '' && vars.CI_RUNNER || 'ubuntu-latest' }}
    needs: version-pr

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release state
        id: release_state
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t CHANGESETS < <(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' -print)
          if [ "${#CHANGESETS[@]}" -gt 0 ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: Run release verification
        if: steps.release_state.outputs.should_release == 'true'
        run: npm run release:verify

      - name: Write release notes
        if: steps.release_state.outputs.should_release == 'true'
        run: node ./scripts/write-release-notes.js ${{ steps.release_state.outputs.version }} dist/release-notes.md

      - name: Create git tag
        if: steps.release_state.outputs.should_release == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.release_state.outputs.version }}"
          git push origin "v${{ steps.release_state.outputs.version }}"

      - name: Create GitHub release
        if: steps.release_state.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "v${{ steps.release_state.outputs.version }}" \
            "dist/agslint-${{ steps.release_state.outputs.version }}.vsix" \
            "dist/agslint-${{ steps.release_state.outputs.version }}.vsix.sha256" \
            --title "AGSLint v${{ steps.release_state.outputs.version }}" \
            --notes-file dist/release-notes.md
