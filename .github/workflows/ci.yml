name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Require changeset on pull requests
        if: github.event_name == 'pull_request'
        env:
          CHANGESET_BASE_REF: origin/${{ github.base_ref }}
        run: node ./scripts/check-changeset.js
